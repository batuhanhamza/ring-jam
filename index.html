<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ring Jam</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800;900&display=swap');

:root {
  --bg:#0d0d11; --surface:#16161e; --surface2:#1e1e28; --surface3:#252533;
  --border:#2a2a3e; --border2:#363650;
  --blue:#5ba3ff; --red:#ff6b6b; --green:#51e89e;
  --yellow:#ffd166; --purple:#c084fc; --orange:#fb923c;
  --text:#dde1f0; --text-dim:#5a5a78; --text-mid:#8888aa;
  --accent:#5ba3ff; --tab-h:48px; --panel-w:272px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;
  height:100vh;overflow:hidden;display:flex;flex-direction:column;}

/* TABS */
#tabs{display:flex;height:var(--tab-h);background:var(--surface);
  border-bottom:2px solid var(--border);flex-shrink:0;align-items:stretch;}
.tab{padding:0 24px;display:flex;align-items:center;gap:7px;
  font-family:'Syne',sans-serif;font-size:.75rem;letter-spacing:3px;
  color:var(--text-dim);cursor:pointer;border-bottom:2px solid transparent;
  margin-bottom:-2px;transition:color .2s,border-color .2s;user-select:none;}
.tab:hover{color:var(--text-mid);}
.tab.active{color:var(--text);border-bottom-color:var(--accent);}
#title{margin-left:auto;padding-right:18px;display:flex;align-items:center;
  font-family:'Syne',sans-serif;font-size:.95rem;font-weight:900;letter-spacing:4px;
  background:linear-gradient(90deg,var(--blue),var(--green));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}

/* PAGES */
.page{display:none;flex:1;overflow:hidden;}
.page.active{display:flex;}

/* ══ EDITOR ══ */
#editor-page{flex-direction:row;}
#editor-panel{width:var(--panel-w);background:var(--surface);
  border-right:2px solid var(--border);display:flex;flex-direction:column;
  overflow-y:auto;flex-shrink:0;}

.psec{padding:11px 13px 9px;border-bottom:1px solid var(--border);}
.plbl{font-size:.56rem;letter-spacing:2px;color:var(--text-dim);margin-bottom:7px;text-transform:uppercase;}

.row{display:flex;align-items:center;gap:7px;}
.row label{font-size:.65rem;color:var(--text-mid);}
input[type=number]{background:var(--surface2);border:1px solid var(--border2);
  border-radius:5px;color:var(--text);font-family:'Space Mono',monospace;
  font-size:.78rem;padding:4px 6px;outline:none;width:48px;}
input[type=number]:focus{border-color:var(--accent);}

.mode-btns{display:flex;gap:4px;flex-wrap:wrap;}
.mbtn{padding:4px 8px;border-radius:5px;border:1px solid var(--border2);
  background:var(--surface2);color:var(--text-mid);font-family:'Space Mono',monospace;
  font-size:.56rem;cursor:pointer;transition:all .15s;}
.mbtn:hover{color:var(--text);}
.mbtn.active{border-color:var(--accent);color:var(--accent);background:rgba(91,163,255,.1);}

.info-box{background:rgba(91,163,255,.06);border:1px solid rgba(91,163,255,.18);
  border-radius:5px;padding:6px 8px;font-size:.56rem;color:var(--text-mid);
  line-height:1.7;margin-top:5px;}
.info-box b{color:var(--blue);}

.cdots{display:flex;gap:5px;flex-wrap:wrap;margin-top:2px;}
.cdot{width:20px;height:20px;border-radius:50%;border:2px solid transparent;
  cursor:pointer;transition:transform .15s,border-color .15s;}
.cdot:hover{transform:scale(1.15);}
.cdot.sel{border-color:#fff;transform:scale(1.15);}

.shape-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;}
.sbtn{aspect-ratio:1;background:var(--surface2);border:1px solid var(--border2);
  border-radius:6px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;padding:4px;transition:all .15s;position:relative;}
.sbtn:hover{background:var(--surface3);}
.sbtn.sel{border-color:var(--accent);background:rgba(91,163,255,.1);}
.slbl{position:absolute;bottom:2px;right:3px;font-size:6px;color:var(--text-dim);}

.rot-btn{width:100%;padding:5px;margin-top:4px;background:var(--surface2);
  border:1px solid var(--border2);border-radius:5px;color:var(--text-mid);
  font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:1px;
  cursor:pointer;transition:all .15s;}
.rot-btn:hover{border-color:var(--accent);color:var(--accent);}

/* Slot editor */
.slot-count-row{display:flex;align-items:center;gap:7px;margin-bottom:7px;}
.slot-count-row label{font-size:.6rem;color:var(--text-mid);}
.slot-count-row input{width:40px;}

.ed-slots{display:flex;flex-direction:column;gap:7px;}
.ed-slot{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:7px 9px;}
.ed-slot-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.ed-slot-title{font-size:.6rem;color:var(--text-mid);}
.del-btn{width:15px;height:15px;border-radius:3px;background:none;
  border:1px solid var(--border2);color:var(--text-dim);font-size:8px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;}
.del-btn:hover{border-color:var(--red);color:var(--red);}

.ed-items{display:flex;flex-direction:column;gap:3px;margin-bottom:5px;}
.ed-item{display:flex;align-items:center;gap:5px;background:var(--surface);
  border:1px solid var(--border);border-radius:4px;padding:3px 6px;cursor:grab;}
.ed-item.dragging-item{opacity:.5;}
.ed-item-drag-handle{color:var(--text-dim);font-size:10px;cursor:grab;}
.ed-item-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.ed-item-lbl{font-size:.58rem;color:var(--text-mid);flex:1;}
.ed-item-cap{font-size:.58rem;color:var(--text-dim);}
.ed-item-del{background:none;border:none;color:var(--text-dim);font-size:9px;cursor:pointer;padding:0 1px;}
.ed-item-del:hover{color:var(--red);}

.add-item-row{display:flex;gap:4px;align-items:center;flex-wrap:wrap;margin-top:3px;}
.add-item-row .cdots{gap:3px;}
.add-item-row input{width:36px;font-size:.68rem;padding:3px 4px;}
.add-item-btn{padding:3px 7px;background:none;border:1px solid var(--border2);
  border-radius:4px;color:var(--text-dim);font-family:'Space Mono',monospace;
  font-size:.56rem;cursor:pointer;transition:all .15s;white-space:nowrap;}
.add-item-btn:hover{border-color:var(--accent);color:var(--accent);}

.add-slot-btn{width:100%;padding:5px;background:none;border:1px dashed var(--border2);
  border-radius:5px;color:var(--text-dim);font-family:'Space Mono',monospace;
  font-size:.6rem;letter-spacing:1px;cursor:pointer;transition:all .15s;margin-top:4px;}
.add-slot-btn:hover{border-color:var(--accent);color:var(--accent);}

.action-btns{display:flex;gap:5px;padding:11px 13px;flex-wrap:wrap;}
.abtn{flex:1;padding:7px 0;border-radius:6px;border:none;font-family:'Space Mono',monospace;
  font-size:.56rem;letter-spacing:1px;cursor:pointer;font-weight:700;transition:opacity .15s;min-width:55px;}
.abtn:hover{opacity:.85;}
.btn-clear{background:var(--surface3);color:var(--text-mid);border:1px solid var(--border2);}
.btn-export{background:var(--surface3);color:var(--green);border:1px solid var(--green);}
.btn-import{background:var(--surface3);color:var(--yellow);border:1px solid var(--yellow);}
.btn-play{background:var(--blue);color:#000;}

#editor-canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;
  background:var(--bg);overflow:auto;position:relative;}
#editor-canvas{display:block;cursor:crosshair;}
#editor-status{position:absolute;bottom:13px;left:50%;transform:translateX(-50%);
  background:var(--surface);border:1px solid var(--border2);border-radius:14px;
  padding:4px 13px;font-size:.6rem;color:var(--text-mid);letter-spacing:1px;
  pointer-events:none;white-space:nowrap;}

/* ══ PLAY ══ */
#play-page{flex-direction:column;align-items:center;justify-content:center;
  gap:12px;background:var(--bg);overflow:auto;padding:14px;}
#play-status{font-size:.6rem;color:var(--text-dim);letter-spacing:2px;min-height:15px;text-align:center;}
#play-area{display:flex;flex-direction:column;align-items:center;gap:11px;}
#play-canvas{display:block;cursor:grab;}
#play-canvas.grabbing{cursor:grabbing;}

/* Queue */
#queue-wrap{display:flex;gap:8px;align-items:flex-start;
  background:var(--surface);border:1px solid var(--border2);border-radius:9px;padding:9px 12px;}
.q-slot-col{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:62px;}
.q-slot-lbl{font-size:.53rem;color:var(--text-dim);letter-spacing:1px;}
.q-slot-items{display:flex;flex-direction:column;align-items:center;gap:3px;width:100%;}
.q-item-box{width:100%;height:54px;border-radius:7px;border:2px solid;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;transition:transform .2s,box-shadow .3s;}
.q-item-box.active{transform:scale(1.05);}
.q-item-box.next{opacity:.45;transform:scale(.92);}
.q-item-name{font-size:.56rem;letter-spacing:1px;font-weight:700;}
.q-bar-bg{width:36px;height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.q-bar-fill{height:100%;border-radius:2px;transition:width .4s;}
.q-cap-txt{font-size:.5rem;color:var(--text-dim);}
.q-empty-box{width:100%;height:54px;border:1px dashed var(--border2);border-radius:7px;}
.q-sep{width:1px;background:var(--border);align-self:stretch;margin:0 2px;}

/* Win */
#win-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.86);
  z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:18px;}
#win-overlay.show{display:flex;}
#win-overlay h2{font-family:'Syne',sans-serif;font-size:2.8rem;
  background:linear-gradient(90deg,var(--blue),var(--green));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:wpulse 1s ease-in-out infinite alternate;}
@keyframes wpulse{from{transform:scale(1)}to{transform:scale(1.06)}}
#win-overlay button{background:var(--blue);border:none;color:#000;
  font-family:'Space Mono',monospace;font-weight:700;font-size:.95rem;
  padding:11px 28px;border-radius:7px;cursor:pointer;letter-spacing:2px;}
</style>
</head>
<body>

<div id="tabs">
  <div class="tab active" data-tab="editor" onclick="switchTab('editor')">✏️ &nbsp;EDITOR</div>
  <div class="tab" data-tab="play" onclick="switchTab('play')">▶ &nbsp;PLAY</div>
  <div id="title">RING JAM</div>
</div>

<div id="editor-page" class="page active">
  <div id="editor-panel">

    <div class="psec">
      <div class="plbl">Board Boyutu</div>
      <div class="row">
        <label>N×N</label>
        <input type="number" id="board-size" value="8" min="3" max="10">
        <button class="mbtn" style="margin-left:3px" onclick="applyBoardSize()">Uygula</button>
      </div>
    </div>

    <div class="psec">
      <div class="plbl">Mod</div>
      <div class="mode-btns">
        <button class="mbtn active" onclick="setMode('shape')" id="btn-mode-shape">📦 Shape</button>
        <button class="mbtn" onclick="setMode('peg')"   id="btn-mode-peg">🔩 Peg</button>
        <button class="mbtn" onclick="setMode('hole')"  id="btn-mode-hole">⭕ Hole</button>
        <button class="mbtn" onclick="setMode('erase')" id="btn-mode-erase">🗑 Sil</button>
      </div>
      <div class="info-box" id="mode-info"></div>
    </div>

    <div class="psec">
      <div class="plbl">Renk</div>
      <div class="cdots" id="color-row"></div>
    </div>

    <div class="psec" id="shape-section">
      <div class="plbl">Şekil</div>
      <div class="shape-grid" id="shape-grid"></div>
      <button class="rot-btn" onclick="rotateShape()">↻ Rotate 90°</button>
    </div>

    <div class="psec">
      <div class="plbl">Slotlar & Kuyruk</div>
      <div class="slot-count-row">
        <label>Görünen slot:</label>
        <input type="number" id="slot-count" value="2" min="1" max="5">
      </div>
      <div class="ed-slots" id="ed-slots"></div>
      <button class="add-slot-btn" onclick="addEdSlot()">+ Slot Ekle</button>
    </div>

    <div style="flex:1"></div>
    <div class="action-btns">
      <button class="abtn btn-clear"  onclick="clearEditor()">Temizle</button>
      <button class="abtn btn-export" onclick="exportLevel()">↓ JSON</button>
      <button class="abtn btn-import" onclick="document.getElementById('imp').click()">↑ JSON</button>
      <button class="abtn btn-play"   onclick="startPlay()">▶ Oyna</button>
    </div>
    <input type="file" id="imp" accept=".json" style="display:none" onchange="importLevel(event)">
  </div>

  <div id="editor-canvas-wrap">
    <canvas id="editor-canvas"></canvas>
    <div id="editor-status">Shape modunda board'a tıkla</div>
  </div>
</div>

<div id="play-page" class="page">
  <div id="play-status">Ringleri kaydır → peg'e oturt → conveyer devreye girer</div>
  <div id="play-area">
    <canvas id="play-canvas"></canvas>
    <div id="queue-wrap"></div>
  </div>
</div>

<div id="win-overlay">
  <h2>LEVEL WIN! 🎉</h2>
  <button onclick="backToEditor()">← Editöre Dön</button>
</div>

  orange:{css:'#fb923c',dim:'rgba(251,146,60,.18)'},

const SHAPES={
  'I-1':[[0,0]],
  'I-2':[[0,0],[0,1]],
  'I-3':[[0,0],[0,1],[0,2]],
  'L-3':[[0,0],[1,0],[1,1]],
  'L-4':[[0,0],[1,0],[2,0],[2,1]],
  'T-4':[[0,0],[0,1],[0,2],[1,1]],
  'S-4':[[0,1],[0,2],[1,0],[1,1]],

const SK=Object.keys(SHAPES);

function rotCell(dr,dc,t){let r=dr,c=dc;for(let i=0;i<t;i++){let x=r;r=c;c=-x;}return[r,c];}
function shapeCells(key,rot){
  const raw=SHAPES[key].map(([dr,dc])=>rotCell(dr,dc,rot));
  const mr=Math.min(...raw.map(c=>c[0])),mc=Math.min(...raw.map(c=>c[1]));
  return raw.map(([r,c])=>[r-mr,c-mc]);
}

// ════════════════════════════════════════════
// EDITOR STATE
// ════════════════════════════════════════════
let edN=8,edCell=64,edGap=4,edConv=40;
let edMode='shape',edColor='blue',edShapeKey='L-4',edRot=0;
let edShapes=[],edPegs=[],edSlots=[];

// ════════════════════════════════════════════
// TABS
// ════════════════════════════════════════════
function switchTab(t){
  document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('active',el.dataset.tab===t));
  document.querySelectorAll('.page').forEach(el=>el.classList.toggle('active',el.id===t+'-page'));
}
function backToEditor(){document.getElementById('win-overlay').classList.remove('show');switchTab('editor');}

// ════════════════════════════════════════════
// EDITOR UI
// ════════════════════════════════════════════
function initEditorUI(){
  // Colors
  const cr=document.getElementById('color-row');cr.innerHTML='';
  CK.forEach(k=>{
    const d=document.createElement('div');
    d.className='cdot'+(k===edColor?' sel':'');
    d.style.background=COLORS[k].css;d.title=k;
    d.onclick=()=>{edColor=k;refreshCDots();refreshShapes();};
    cr.appendChild(d);
  });
  refreshShapes();setMode('shape');refreshEdSlots();
}

function refreshCDots(){
  document.querySelectorAll('#color-row .cdot').forEach((d,i)=>d.classList.toggle('sel',CK[i]===edColor));
}

function refreshShapes(){
  const g=document.getElementById('shape-grid');g.innerHTML='';
  SK.forEach(k=>{
    const btn=document.createElement('button');
    btn.className='sbtn'+(k===edShapeKey?' sel':'');
    btn.onclick=()=>{edShapeKey=k;edRot=0;refreshShapes();drawEditor();};
    const cv=document.createElement('canvas');cv.width=44;cv.height=44;
    drawShapePreview(cv,k,0,edColor);btn.appendChild(cv);
    const lbl=document.createElement('span');lbl.className='slbl';lbl.textContent=k;btn.appendChild(lbl);
    g.appendChild(btn);
  });
}

function drawShapePreview(canvas,key,rot,color){
  const ctx=canvas.getContext('2d');
  const cells=shapeCells(key,rot);
  const mxR=Math.max(...cells.map(c=>c[0])),mxC=Math.max(...cells.map(c=>c[1]));
  const sz=Math.min(Math.floor((canvas.width-6)/(mxC+1)),Math.floor((canvas.height-6)/(mxR+1)));
  const ox=Math.floor((canvas.width-(mxC+1)*sz)/2),oy=Math.floor((canvas.height-(mxR+1)*sz)/2);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const col=COLORS[color];
  cells.forEach(([r,c])=>{
    rr(ctx,ox+c*sz+1,oy+r*sz+1,sz-2,sz-2,3);
    ctx.fillStyle=col.dim;ctx.fill();
    ctx.strokeStyle=col.css;ctx.lineWidth=1.5;ctx.stroke();
  });
}

function rotateShape(){edRot=(edRot+1)%4;drawEditor();}

function refreshEdSlots(){

  edSlots.forEach((slot,si)=>{
    const div=document.createElement('div');div.className='ed-slot';

    const hdr=document.createElement('div');hdr.className='ed-slot-hdr';

    const del=document.createElement('button');del.className='del-btn';del.textContent='✕';
    del.onclick=()=>{edSlots.splice(si,1);refreshEdSlots();};
    hdr.appendChild(ttl);hdr.appendChild(del);div.appendChild(hdr);

    // Items list (drag to reorder)
    const itemsList=document.createElement('div');itemsList.className='ed-items';
    itemsList.dataset.slotIdx=si;

    slot.items.forEach((item,ii)=>{
      const row=document.createElement('div');row.className='ed-item';
      row.draggable=true;
      row.dataset.itemIdx=ii;

      const handle=document.createElement('span');handle.className='ed-item-drag-handle';handle.textContent='⠿';
      const dot=document.createElement('div');dot.className='ed-item-dot';dot.style.background=COLORS[item.color].css;
      const lbl=document.createElement('span');lbl.className='ed-item-lbl';lbl.textContent=item.color.toUpperCase();
      const cap=document.createElement('span');cap.className='ed-item-cap';cap.textContent='×'+item.capacity;
      const del2=document.createElement('button');del2.className='ed-item-del';del2.textContent='✕';
      del2.onclick=(e)=>{e.stopPropagation();slot.items.splice(ii,1);refreshEdSlots();};

      row.appendChild(handle);row.appendChild(dot);row.appendChild(lbl);row.appendChild(cap);row.appendChild(del2);
      itemsList.appendChild(row);

      // Drag reorder
      row.addEventListener('dragstart',e=>{
        itemDrag={slotIdx:si,itemIdx:ii};
        row.classList.add('dragging-item');
        e.dataTransfer.effectAllowed='move';
      });
      row.addEventListener('dragend',()=>{row.classList.remove('dragging-item');itemDrag=null;});
      row.addEventListener('dragover',e=>{
        e.preventDefault();
        if(!itemDrag||itemDrag.slotIdx!==si||itemDrag.itemIdx===ii)return;
        const items=edSlots[si].items;
        const moved=items.splice(itemDrag.itemIdx,1)[0];
        items.splice(ii,0,moved);
        itemDrag.itemIdx=ii;
        refreshEdSlots();
      });
    });
    div.appendChild(itemsList);

    // Add item row
    if(!slotAddColor[si])slotAddColor[si]='blue';
    const addRow=document.createElement('div');addRow.className='add-item-row';
    const miniC=document.createElement('div');miniC.className='cdots';
    CK.forEach(k=>{
      const d=document.createElement('div');

      d.style.background=COLORS[k].css;d.style.width='14px';d.style.height='14px';
      d.onclick=()=>{slotAddColor[si]=k;refreshEdSlots();};
      miniC.appendChild(d);
    });
    const capIn=document.createElement('input');capIn.type='number';capIn.value=4;capIn.min=1;capIn.max=99;
    capIn.id=`sc-${si}`;
    const addBtn=document.createElement('button');addBtn.className='add-item-btn';addBtn.textContent='+ Item';
    addBtn.onclick=()=>{
      const cap=parseInt(document.getElementById(`sc-${si}`).value)||4;
      slot.items.push({color:slotAddColor[si],capacity:cap});
      refreshEdSlots();
    };
    addRow.appendChild(miniC);addRow.appendChild(capIn);addRow.appendChild(addBtn);
    div.appendChild(addRow);
    container.appendChild(div);
  });

// EDITOR CANVAS
// ════════════════════════════════════════════
function edBoardPx(){return edN*edCell+(edN+1)*edGap;}
function edWrapPx(){return edBoardPx()+edConv*2;}

function applyBoardSize(){
  edN=Math.max(3,Math.min(10,parseInt(document.getElementById('board-size').value)||8));
  edShapes=[];edPegs=[];setupEdCanvas();drawEditor();
}

function setupEdCanvas(){
  const cv=document.getElementById('editor-canvas');
  const sz=edWrapPx();cv.width=sz;cv.height=sz;
}

function cellXYEd(r,c){return{x:edConv+edGap+c*(edCell+edGap),y:edConv+edGap+r*(edCell+edGap)};}

function clientToEdCell(cx,cy){
  const cv=document.getElementById('editor-canvas');
  const rect=cv.getBoundingClientRect();
  const x=cx-rect.left-edConv-edGap,y=cy-rect.top-edConv-edGap;
  return{r:Math.floor(y/(edCell+edGap)),c:Math.floor(x/(edCell+edGap))};
}

function isEdge(r,c){return r===0||r===edN-1||c===0||c===edN-1;}

function rr(ctx,x,y,w,h,rad){
  ctx.beginPath();
  ctx.moveTo(x+rad,y);ctx.lineTo(x+w-rad,y);ctx.arcTo(x+w,y,x+w,y+rad,rad);
  ctx.lineTo(x+w,y+h-rad);ctx.arcTo(x+w,y+h,x+w-rad,y+h,rad);
  ctx.lineTo(x+rad,y+h);ctx.arcTo(x,y+h,x,y+h-rad,rad);
  ctx.lineTo(x,y+rad);ctx.arcTo(x,y,x+rad,y,rad);
  ctx.closePath();
}

function drawEditor(){
  const cv=document.getElementById('editor-canvas');
  const ctx=cv.getContext('2d');
  const sz=edWrapPx(),bpx=edBoardPx();
  ctx.clearRect(0,0,sz,sz);

  ctx.fillStyle='#12121a';rr(ctx,0,0,sz,sz,10);ctx.fill();
  ctx.fillStyle='#191924';rr(ctx,edConv,edConv,bpx,bpx,4);ctx.fill();

  const half=edConv/2,step=bpx/(edN+1);
  ctx.fillStyle='#26264a';ctx.font='10px monospace';
  ctx.textAlign='center';ctx.textBaseline='middle';
  for(let i=1;i<=edN;i++){
    ctx.fillText('‹',edConv+i*step,half);
    ctx.fillText('›',edConv+i*step,sz-half);
    ctx.fillText('↓',half,edConv+i*step);
    ctx.fillText('↑',sz-half,edConv+i*step);
  }

  for(let r=0;r<edN;r++)for(let c=0;c<edN;c++){
    const{x,y}=cellXYEd(r,c);
    ctx.fillStyle=isEdge(r,c)?'#1c1c2e':'#1e1e2b';
    ctx.strokeStyle='#232336';ctx.lineWidth=1;
    rr(ctx,x,y,edCell,edCell,6);ctx.fill();ctx.stroke();
  }

  drawShapes(ctx,edShapes,(r,c)=>cellXYEd(r,c),edCell,edGap,()=>false);

  edPegs.forEach(peg=>{
    const col=COLORS[peg.color];
    const{x,y}=cellXYEd(peg.boardR,peg.boardC);
    const cx=x+edCell/2,cy=y+edCell/2;
    ctx.strokeStyle=col.css;ctx.lineWidth=3;ctx.fillStyle=col.dim;
    ctx.beginPath();ctx.arc(cx,cy,13,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.fillStyle=col.css;ctx.beginPath();ctx.arc(cx,cy,4,0,Math.PI*2);ctx.fill();
  });

  if(edHover&&edMode==='shape'){
    const{r:hr,c:hc}=edHover;
    const cells=shapeCells(edShapeKey,edRot);
    const col=COLORS[edColor];
    let valid=true;
    cells.forEach(([dr,dc])=>{
      const nr=hr+dr,nc=hc+dc;
      if(nr<0||nr>=edN||nc<0||nc>=edN)valid=false;
      if(edShapes.some(s=>s.cells.some(cc=>cc.r===nr&&cc.c===nc)))valid=false;
    });
    ctx.globalAlpha=.55;
    cells.forEach(([dr,dc])=>{
      const nr=hr+dr,nc=hc+dc;
      if(nr<0||nr>=edN||nc<0||nc>=edN)return;
      const{x,y}=cellXYEd(nr,nc);
      ctx.fillStyle=valid?col.dim:'rgba(255,80,80,.2)';
      ctx.strokeStyle=valid?col.css:'#ff5050';ctx.lineWidth=2;
      rr(ctx,x+1,y+1,edCell-2,edCell-2,6);ctx.fill();ctx.stroke();
    });
    ctx.globalAlpha=1;
  }
}

// Shared shape renderer with proper per-shape outline (no bleed between shapes)
function drawShapes(ctx,shapes,xyFn,cell,gap,isDraggingFn){
  shapes.forEach(shape=>{
    if(shape.collected)return;
    const col=COLORS[shape.color];
    const isDrag=isDraggingFn(shape.id);
    const cellSet=new Set(shape.cells.map(({r,c})=>`${r},${c}`));

    shape.cells.forEach(({r,c})=>{
      const{x,y}=xyFn(r,c);
      // Fill
      ctx.fillStyle=isDrag?col.css+'33':col.dim;
      rr(ctx,x+2,y+2,cell-4,cell-4,6);ctx.fill();

      // Per-edge stroke — thick outside, thin between same-shape cells
      const dirs=[[-1,0,'top'],[1,0,'bot'],[0,-1,'lft'],[0,1,'rgt']];
      dirs.forEach(([dr,dc,side])=>{
        const shared=cellSet.has(`${r+dr},${c+dc}`);
        ctx.strokeStyle=col.css;
        ctx.lineWidth=shared?.8:2.8;
        ctx.globalAlpha=shared?.15:1;
        ctx.beginPath();
        const p=2,q=cell-2;
        if(side==='top'){ctx.moveTo(x+p,y+p);ctx.lineTo(x+q,y+p);}
        if(side==='bot'){ctx.moveTo(x+p,y+q);ctx.lineTo(x+q,y+q);}
        if(side==='lft'){ctx.moveTo(x+p,y+p);ctx.lineTo(x+p,y+q);}
        if(side==='rgt'){ctx.moveTo(x+q,y+p);ctx.lineTo(x+q,y+q);}
        ctx.stroke();ctx.globalAlpha=1;
      });
    });

    // Hole icon
    if(shape.holeR!==undefined){
      const{x,y}=xyFn(shape.holeR,shape.holeC);
      const cx=x+cell/2,cy=y+cell/2;
      ctx.shadowColor=col.css;ctx.shadowBlur=8;
      ctx.strokeStyle=col.css;ctx.lineWidth=3;ctx.fillStyle='rgba(0,0,0,.55)';
      ctx.beginPath();ctx.arc(cx,cy,11,0,Math.PI*2);ctx.fill();ctx.stroke();
      ctx.shadowBlur=0;
    }
  });
}

// Editor mouse
const edCv=document.getElementById('editor-canvas');
edCv.addEventListener('mousemove',e=>{
  const{r,c}=clientToEdCell(e.clientX,e.clientY);
  edHover=(r>=0&&r<edN&&c>=0&&c<edN)?{r,c}:null;drawEditor();
});
edCv.addEventListener('mouseleave',()=>{edHover=null;drawEditor();});
edCv.addEventListener('click',e=>{
  const{r,c}=clientToEdCell(e.clientX,e.clientY);
  if(r<0||r>=edN||c<0||c>=edN)return;

  if(edMode==='shape'){
    const cells=shapeCells(edShapeKey,edRot);
    const nc=cells.map(([dr,dc])=>({r:r+dr,c:c+dc}));
    if(nc.some(({r:nr,c:ncol})=>nr<0||nr>=edN||ncol<0||ncol>=edN)){setEdSt('Board dışına taşıyor!');return;}
    if(nc.some(({r:nr,c:ncol})=>edShapes.some(s=>s.cells.some(cc=>cc.r===nr&&cc.c===ncol)))){setEdSt('Hücre dolu!');return;}
    edShapes.push({id:edNextId++,color:edColor,cells:nc,holeR:undefined,holeC:undefined});
    setEdSt(`${edShapeKey} (${edColor}) yerleştirildi`);

  }else if(edMode==='peg'){
    if(!isEdge(r,c)){setEdSt('Peg sadece kenara!');return;}
    const idx=edPegs.findIndex(p=>p.boardR===r&&p.boardC===c);
    if(idx>=0){edPegs.splice(idx,1);setEdSt('Peg silindi');}
    else{edPegs.push({color:edColor,boardR:r,boardC:c});setEdSt(`${edColor} peg (${r},${c})`);}

  }else if(edMode==='hole'){
    const s=edShapes.find(s=>s.cells.some(cc=>cc.r===r&&cc.c===c));
    if(!s){setEdSt('Shape hücresi seç!');return;}
    s.holeR=r;s.holeC=c;setEdSt(`Hole (${r},${c})`);

  }else if(edMode==='erase'){
    const si=edShapes.findIndex(s=>s.cells.some(cc=>cc.r===r&&cc.c===c));
    if(si>=0){edShapes.splice(si,1);setEdSt('Shape silindi');}
    const pi=edPegs.findIndex(p=>p.boardR===r&&p.boardC===c);
    if(pi>=0){edPegs.splice(pi,1);setEdSt('Peg silindi');}
  }
  drawEditor();
});
function setEdSt(m){document.getElementById('editor-status').textContent=m;}

// ════════════════════════════════════════════
// PLAY ENGINE
// ════════════════════════════════════════════
const PC=64,PG=4,PCONV=40;
let playN=8;
function pBpx(){return playN*PC+(playN+1)*PG;}
function pWpx(){return pBpx()+PCONV*2;}

let playGrid=[],playShapes=[],playPegs=[],playSlots=[];
let playSlotCount=2,conveying=false,convAnim=null,drag=null;

function cellXYP(r,c){return{x:PCONV+PG+c*(PC+PG),y:PCONV+PG+r*(PC+PG)};}

// ── VALIDATION ──
function validateLevel(){
  const errs=[];
  if(edShapes.length===0){errs.push('Board boş!');}
  edShapes.forEach((s,i)=>{
    if(s.holeR===undefined)errs.push(`Shape #${i+1} (${s.color}): hole yok!`);
  });
  // Each color must have a peg
  const shapeColors=[...new Set(edShapes.map(s=>s.color))];
  shapeColors.forEach(col=>{
    if(!edPegs.some(p=>p.color===col))errs.push(`${col} için peg yok!`);
  });
  // Capacity check: total cells per color <= total capacity per color across all slots
  shapeColors.forEach(col=>{
    const totalCells=edShapes.filter(s=>s.color===col).reduce((a,s)=>a+s.cells.length,0);
    const totalCap=edSlots.reduce((a,slot)=>a+slot.items.filter(it=>it.color===col).reduce((b,it)=>b+it.capacity,0),0);
    if(totalCap===0)errs.push(`${col}: slotta hiç item yok!`);
    else if(totalCap<totalCells)errs.push(`${col}: kapasite yetersiz (board:${totalCells}, slot toplam:${totalCap})`);
    else if(totalCap>totalCells)errs.push(`⚠️ ${col}: fazla kapasite (board:${totalCells}, slot:${totalCap}) — bazı itemlar boşta kalır`);
  });
  if(edSlots.length===0)errs.push('Hiç slot yok!');
  return errs;
}

function startPlay(){
  const errs=validateLevel();
  const hardErrs=errs.filter(e=>!e.startsWith('⚠️'));
  if(hardErrs.length>0){setEdSt(hardErrs[0]);alert(errs.join('\n'));return;}
  if(errs.length>0&&!confirm(errs.join('\n')+'\n\nYine de oyna?'))return;
  switchTab('play');initPlay();
}

function initPlay(){
  playN=edN;
  playSlotCount=parseInt(document.getElementById('slot-count').value)||2;
  playGrid=Array.from({length:playN},()=>Array(playN).fill(null));

  playShapes=edShapes.map(s=>({
    id:s.id,color:s.color,
    cells:s.cells.map(c=>({...c})),
    holeR:s.holeR,holeC:s.holeC,
    collected:false,
  }));
  playShapes.forEach(s=>s.cells.forEach(({r,c})=>{playGrid[r][c]=s.id;}));

  playPegs=edPegs.map(p=>({...p,shapeId:null}));

  playSlots=edSlots.slice(0,playSlotCount).map(slot=>({
    queue:slot.items.map((item,i)=>({
      id:`q${Math.random().toString(36).slice(2)}`,
      color:item.color,capacity:item.capacity,filled:0,
      state:i===0?'active':'waiting',
    })),
  }));
  while(playSlots.length<playSlotCount)playSlots.push({queue:[]});

  conveying=false;drag=null;convAnim=null;
  setupPlayCanvas();drawPlay();renderQueue();
  checkPegs();
}

function setupPlayCanvas(){
  const cv=document.getElementById('play-canvas');
  cv.width=pWpx();cv.height=pWpx();
}

// ── DRAW PLAY ──
function drawPlay(){
  const cv=document.getElementById('play-canvas');
  const ctx=cv.getContext('2d');
  const sz=pWpx(),bpx=pBpx();
  ctx.clearRect(0,0,sz,sz);

  ctx.fillStyle='#12121a';rr(ctx,0,0,sz,sz,10);ctx.fill();

  const half=PCONV/2,step=bpx/(playN+1);
  ctx.fillStyle='#20203a';ctx.font='10px monospace';
  ctx.textAlign='center';ctx.textBaseline='middle';
  for(let i=1;i<=playN;i++){
    ctx.fillText('‹',PCONV+i*step,half);
    ctx.fillText('›',PCONV+i*step,sz-half);
    ctx.fillText('↓',half,PCONV+i*step);
    ctx.fillText('↑',sz-half,PCONV+i*step);
  }

  ctx.fillStyle='#181824';rr(ctx,PCONV,PCONV,bpx,bpx,4);ctx.fill();

  for(let r=0;r<playN;r++)for(let c=0;c<playN;c++){
    const{x,y}=cellXYP(r,c);
    ctx.fillStyle=(r===0||r===playN-1||c===0||c===playN-1)?'#1c1c2d':'#1e1e2c';
    ctx.strokeStyle='#232336';ctx.lineWidth=1;
    rr(ctx,x,y,PC,PC,7);ctx.fill();ctx.stroke();
  }

  drawShapes(ctx,playShapes,(r,c)=>cellXYP(r,c),PC,PG,id=>drag&&drag.shapeId===id);

  // Pegs
  playPegs.forEach(peg=>{
    const col=COLORS[peg.color];
    const{x,y}=cellXYP(peg.boardR,peg.boardC);
    const cx=x+PC/2,cy=y+PC/2;
    const filled=peg.shapeId!==null;
    ctx.strokeStyle=col.css;ctx.lineWidth=3;
    ctx.fillStyle=filled?col.dim:'rgba(0,0,0,.4)';
    ctx.shadowColor=filled?col.css:'transparent';ctx.shadowBlur=filled?14:0;
    ctx.beginPath();ctx.arc(cx,cy,13,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.shadowBlur=0;
    if(filled){ctx.fillStyle=col.css;ctx.beginPath();ctx.arc(cx,cy,5,0,Math.PI*2);ctx.fill();}
  });

  // Conveyer item
  if(convAnim){
    const col=COLORS[convAnim.color];
    ctx.fillStyle=col.dim;ctx.strokeStyle=col.css;ctx.lineWidth=2;
    ctx.shadowColor=col.css;ctx.shadowBlur=12;
    rr(ctx,convAnim.x-13,convAnim.y-13,26,26,6);ctx.fill();ctx.stroke();
    ctx.shadowBlur=0;
    ctx.fillStyle=col.css;ctx.font='bold 8px Space Mono';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(convAnim.color[0].toUpperCase(),convAnim.x,convAnim.y);
  }
}

// ── QUEUE RENDER ──
function renderQueue(){
  const wrap=document.getElementById('queue-wrap');wrap.innerHTML='';
  playSlots.forEach((slot,si)=>{
    if(si>0){const sep=document.createElement('div');sep.className='q-sep';wrap.appendChild(sep);}
    const col=document.createElement('div');col.className='q-slot-col';
    const lbl=document.createElement('div');lbl.className='q-slot-lbl';
    lbl.textContent=`SLOT ${si+1}`;col.appendChild(lbl);

    const itemsDiv=document.createElement('div');itemsDiv.className='q-slot-items';
    const visible=slot.queue.filter(q=>q.state!=='done');
    if(visible.length===0){
      const e=document.createElement('div');e.className='q-empty-box';itemsDiv.appendChild(e);
    }else{
      visible.forEach((item,ii)=>{
        const cc=COLORS[item.color];
        const box=document.createElement('div');
        box.className='q-item-box'+(item.state==='active'?' active':ii>0?' next':'');
        box.style.borderColor=cc.css;box.style.background=cc.dim;
        if(item.state==='active')box.style.boxShadow=`0 0 12px ${cc.css}55`;

        const nm=document.createElement('div');nm.className='q-item-name';
        nm.style.color=cc.css;nm.textContent=item.color.toUpperCase();box.appendChild(nm);

        const bg=document.createElement('div');bg.className='q-bar-bg';
        const fill=document.createElement('div');fill.className='q-bar-fill';
        fill.style.background=cc.css;fill.style.width=(item.filled/item.capacity*100)+'%';
        bg.appendChild(fill);box.appendChild(bg);

        const ct=document.createElement('div');ct.className='q-cap-txt';
        ct.textContent=`${item.filled}/${item.capacity}`;box.appendChild(ct);
        itemsDiv.appendChild(box);
      });
    }
    col.appendChild(itemsDiv);wrap.appendChild(col);
  });
}

// ════════════════════════════════════════════
// DRAG — AXIS LOCK WITH COMMIT-ON-DIRECTION-CHANGE
// ════════════════════════════════════════════
function hitShape(px,py){
  for(const s of playShapes){
    if(s.collected)continue;
    for(const{r,c}of s.cells){
      const{x,y}=cellXYP(r,c);
      if(px>=x&&px<=x+PC&&py>=y&&py<=y+PC)return s.id;
    }
  }
  return null;
}

function pxToPlayPx(cx,cy){
  const rect=document.getElementById('play-canvas').getBoundingClientRect();
  return{px:cx-rect.left,py:cy-rect.top};
}

function computeRange(shape,axis){
  // Temporarily clear from grid
  shape.cells.forEach(({r,c})=>{if(playGrid[r]?.[c]===shape.id)playGrid[r][c]=null;});
  const step=PC+PG;let minS=-Infinity,maxS=Infinity;
  if(axis==='h'){
    shape.cells.forEach(({r,c})=>{
      let l=0;for(let nc=c-1;nc>=0;nc--){if(playGrid[r][nc]!==null)break;l--;}
      let ri=0;for(let nc=c+1;nc<playN;nc++){if(playGrid[r][nc]!==null)break;ri++;}
      minS=Math.max(minS,l*step);maxS=Math.min(maxS,ri*step);
    });
  }else{
    shape.cells.forEach(({r,c})=>{
      let u=0;for(let nr=r-1;nr>=0;nr--){if(playGrid[nr][c]!==null)break;u--;}
      let d=0;for(let nr=r+1;nr<playN;nr++){if(playGrid[nr][c]!==null)break;d++;}
      minS=Math.max(minS,u*step);maxS=Math.min(maxS,d*step);
    });
  }
  shape.cells.forEach(({r,c})=>{playGrid[r][c]=shape.id;});
  return{min:minS,max:maxS};
}

// Commit current slide — snap shape to grid permanently
function commitSlide(shape){
  const step=PC+PG;
  if(!drag||!drag.axis)return;
  const snap=Math.round(drag.slide/step);
  const newCells=drag.baseCells.map(({r,c})=>
    drag.axis==='h'?{r,c:c+snap}:{r:r+snap,c}
  );
  const newHR=drag.axis==='h'?drag.baseHR:drag.baseHR+snap;
  const newHC=drag.axis==='h'?drag.baseHC+snap:drag.baseHC;

  // Clear old
  shape.cells.forEach(({r,c})=>{if(playGrid[r]?.[c]===shape.id)playGrid[r][c]=null;});
  const valid=newCells.every(({r,c})=>r>=0&&r<playN&&c>=0&&c<playN&&playGrid[r][c]===null);
  shape.cells=valid?newCells:drag.baseCells.map(c=>({...c}));
  shape.holeR=valid?newHR:drag.baseHR;
  shape.holeC=valid?newHC:drag.baseHC;
  shape.cells.forEach(({r,c})=>{playGrid[r][c]=shape.id;});

  // Update drag base for next segment
  drag.baseCells=shape.cells.map(c=>({...c}));
  drag.baseHR=shape.holeR;
  drag.baseHC=shape.holeC;
  drag.slide=0;
}

const pCv=document.getElementById('play-canvas');

pCv.addEventListener('mousedown',e=>{
  if(conveying)return;
  const{px,py}=pxToPlayPx(e.clientX,e.clientY);
  const id=hitShape(px,py);if(!id)return;
  e.preventDefault();startDrag(id,px,py);
});
pCv.addEventListener('touchstart',e=>{
  if(conveying)return;e.preventDefault();
  const t=e.touches[0];
  const{px,py}=pxToPlayPx(t.clientX,t.clientY);
  const id=hitShape(px,py);if(!id)return;
  startDrag(id,px,py);
},{passive:false});

function startDrag(id,px,py){
  const shape=playShapes.find(s=>s.id===id);
  if(!shape||shape.collected)return;
  pCv.classList.add('grabbing');
  drag={
    shapeId:id,shape,
    baseCells:shape.cells.map(c=>({...c})),
    baseHR:shape.holeR,baseHC:shape.holeC,
    startPx:px,startPy:py,
    axis:null,range:null,slide:0,
    lastAxis:null,
  };
  // Detach from any peg immediately
  playPegs.forEach(p=>{if(p.shapeId===id)p.shapeId=null;});
}

document.addEventListener('mousemove',e=>{if(drag)onDragMove(e.clientX,e.clientY);});
document.addEventListener('touchmove',e=>{
  if(!drag)return;e.preventDefault();
  onDragMove(e.touches[0].clientX,e.touches[0].clientY);
},{passive:false});

const AXIS_DEAD=2,AXIS_SWITCH=14; // px thresholds

function onDragMove(cx,cy){
  const{px,py}=pxToPlayPx(cx,cy);
  const dx=px-drag.startPx,dy=py-drag.startPy;
  const step=PC+PG;

  const absDx=Math.abs(dx),absDy=Math.abs(dy);

  // Determine desired axis
  let newAxis=drag.axis;
  if(!drag.axis){
    // Haven't locked yet — need dead zone
    if(absDx>AXIS_DEAD||absDy>AXIS_DEAD)
      newAxis=absDx>=absDy?'h':'v';
  }else{
    // Already locked — switch axis if perpendicular movement exceeds threshold
    const perp=drag.axis==='h'?absDy:absDx;
    if(perp>AXIS_SWITCH){
      newAxis=drag.axis==='h'?'v':'h';
    }
  }

  if(!newAxis)return;

  // Axis changed — commit previous movement first
  if(newAxis!==drag.axis){
    commitSlide(drag.shape);
    drag.axis=newAxis;
    drag.range=computeRange(drag.shape,drag.axis);
    // Reset start reference to current mouse position
    drag.startPx=px;drag.startPy=py;
  }

  if(!drag.range)drag.range=computeRange(drag.shape,drag.axis);

  const raw=drag.axis==='h'?(px-drag.startPx):(py-drag.startPy);
  drag.slide=Math.max(drag.range.min,Math.min(drag.range.max,raw));
  const snap=Math.round(drag.slide/step);

  // Visual update
  drag.shape.cells.forEach(({r,c})=>{if(playGrid[r]?.[c]===drag.shapeId)playGrid[r][c]=null;});
  drag.shape.cells=drag.baseCells.map(({r,c})=>drag.axis==='h'?{r,c:c+snap}:{r:r+snap,c});
  drag.shape.holeR=drag.axis==='h'?drag.baseHR:drag.baseHR+snap;
  drag.shape.holeC=drag.axis==='h'?drag.baseHC+snap:drag.baseHC;
  drag.shape.cells.forEach(({r,c})=>{if(r>=0&&r<playN&&c>=0&&c<playN)playGrid[r][c]=drag.shapeId;});

  drawPlay();
}

document.addEventListener('mouseup',endDrag);
document.addEventListener('touchend',endDrag);

function endDrag(){
  if(!drag)return;
  pCv.classList.remove('grabbing');
  if(drag.axis)commitSlide(drag.shape);
  drag=null;
  drawPlay();checkPegs();
}

// ════════════════════════════════════════════
// PEG CHECK
// ════════════════════════════════════════════
function checkPegs(){
  let anyNew=false;
  playPegs.forEach(peg=>{
    if(peg.shapeId!==null)return;
    playShapes.forEach(shape=>{
      if(shape.collected||shape.color!==peg.color||peg.shapeId!==null)return;
      if(shape.holeR===peg.boardR&&shape.holeC===peg.boardC){
        peg.shapeId=shape.id;anyNew=true;
        setPlaySt(`✅ ${shape.color.toUpperCase()} peg'e takıldı!`);
      }
    });
  });
  if(anyNew){drawPlay();tryConveyer();}
}

// ════════════════════════════════════════════
// CONVEYER
// ════════════════════════════════════════════
function buildPath(){
  const pts=[],half=PCONV/2,sz=pWpx(),steps=playN*5;
  for(let i=0;i<=steps;i++)pts.push({x:sz-half-(sz-PCONV)*i/steps,y:half});
  for(let i=1;i<=steps;i++)pts.push({x:half,y:half+(sz-PCONV)*i/steps});
  for(let i=1;i<=steps;i++)pts.push({x:half+(sz-PCONV)*i/steps,y:sz-half});
  for(let i=1;i<steps;i++) pts.push({x:sz-half,y:sz-half-(sz-PCONV)*i/steps});
  return pts;
}

function nearPt(path,x,y){
  let best=0,bd=Infinity;
  path.forEach((pt,i)=>{const d=Math.hypot(pt.x-x,pt.y-y);if(d<bd){bd=d;best=i;}});
  return best;
}

function tryConveyer(){
  if(conveying)return;
  for(let si=0;si<playSlots.length;si++){
    const slot=playSlots[si];
    const active=slot.queue.find(q=>q.state==='active');
    if(!active)continue;
    const peg=playPegs.find(p=>p.color===active.color&&p.shapeId!==null);
    if(peg){animateConveyer(active,peg,si);return;}
  }
}

function animateConveyer(item,peg,slotIdx){
  conveying=true;renderQueue();
  setPlaySt(`🚂 ${item.color.toUpperCase()} conveyer'a bindi!`);

  const path=buildPath();
  const sz=pWpx();
  const entryIdx=nearPt(path,sz-PCONV/2,sz-PCONV/2);
  const{x:px,y:py}=cellXYP(peg.boardR,peg.boardC);
  const pegIdx=nearPt(path,px+PC/2,py+PC/2);
  const pLen=path.length;

  const seg=[];let i=entryIdx;
  while(true){seg.push(i);if(i===pegIdx)break;i=(i+1)%pLen;if(seg.length>pLen+5)break;}

  convAnim={color:item.color,...path[entryIdx]};
  let step=0;
  function go(){
    if(step>=seg.length){convAnim=null;doCollect(item,peg,slotIdx,path,pegIdx);return;}
    Object.assign(convAnim,path[seg[step]]);drawPlay();step++;
    setTimeout(go,9);
  }
  go();
}

// Sort cells: farthest from hole first (hole always last)
function collectOrder(shape){
  return shape.cells.map(({r,c})=>({
    r,c,dist:Math.abs(r-shape.holeR)+Math.abs(c-shape.holeC),
  })).sort((a,b)=>b.dist-a.dist||(b.c-a.c)||(b.r-a.r));
}

function doCollect(item,peg,slotIdx,path,pegIdx){
  const shape=playShapes.find(s=>s.id===peg.shapeId);
  if(!shape){finishConveyer(item,slotIdx);return;}

  const order=collectOrder(shape);
  const canTake=item.capacity-item.filled;
  const toTake=Math.min(canTake,order.length);
  const toRemove=order.slice(0,toTake);
  const toKeep=order.slice(toTake);

  let ri=0;
  function removeNext(){
    if(ri>=toRemove.length){afterCollect(item,peg,slotIdx,path,pegIdx,toRemove,toKeep,shape);return;}
    const{r,c}=toRemove[ri];
    playGrid[r][c]=null;
    shape.cells=shape.cells.filter(cc=>!(cc.r===r&&cc.c===c));
    item.filled++;renderQueue();drawPlay();ri++;
    setTimeout(removeNext,110);
  }
  removeNext();
}

function afterCollect(item,peg,slotIdx,path,pegIdx,removed,kept,shape){
  peg.shapeId=null;
  if(kept.length===0){
    shape.collected=true;shape.cells=[];
  }else{
    shape.cells=kept.map(({r,c})=>({r,c}));
    shape.cells.forEach(({r,c})=>{playGrid[r][c]=shape.id;});
  }
  setPlaySt(`📦 ${removed.length} hücre toplandı (${item.filled}/${item.capacity})`);

  // Return path
  const pLen=path.length,sz=pWpx();
  const exitIdx=nearPt(path,sz-PCONV/2,sz-PCONV/2);
  const seg=[];let i=pegIdx;
  while(true){seg.push(i);if(i===exitIdx)break;i=(i+1)%pLen;if(seg.length>pLen+5)break;}

  convAnim={color:item.color,...path[pegIdx]};
  let step=0;
  function goBack(){
    if(step>=seg.length){convAnim=null;finishConveyer(item,slotIdx);return;}
    Object.assign(convAnim,path[seg[step]]);drawPlay();step++;
    setTimeout(goBack,9);
  }
  goBack();
}

function finishConveyer(item,slotIdx){
  if(item.filled>=item.capacity){
    item.state='done';
    setPlaySt(`✨ ${item.color.toUpperCase()} tamamlandı!`);
    const next=playSlots[slotIdx].queue.find(q=>q.state==='waiting');
    if(next)next.state='active';
  }else{
    setPlaySt(`↩️ ${item.color.toUpperCase()} döndü (${item.filled}/${item.capacity})`);
  }
  conveying=false;drawPlay();renderQueue();checkWin();

  // Re-check pegs (kalan shape hala peg üzerinde olabilir)
  setTimeout(()=>{checkPegs();tryConveyer();},300);
}

function checkWin(){
  if(playShapes.every(s=>s.collected))
    setTimeout(()=>document.getElementById('win-overlay').classList.add('show'),600);
}
function setPlaySt(m){document.getElementById('play-status').textContent=m;}

// ════════════════════════════════════════════
// BOOT
// ════════════════════════════════════════════
initEditorUI();
setupEdCanvas();
loadLevelData(DEFAULT_LEVEL);
switchTab('play');initPlay();
</script>
